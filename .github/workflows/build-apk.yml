name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'app/**'
      - '.github/workflows/build-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      npm_config_engine_strict: 'false'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        working-directory: app
        run: |
          node -v
          npm -v
          npm install --no-audit --no-fund

      - name: Build web assets
        working-directory: app
        run: npm run build

      - name: Sync Capacitor Android
        working-directory: app
        run: npx cap sync android

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK platform & build-tools
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools" || sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Build Debug APK
        working-directory: app/android
        run: chmod +x ./gradlew && ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Read-debug-apk
          path: app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
